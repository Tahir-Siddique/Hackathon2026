<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CVE-to-My-Stack{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' }
          }
        }
      }
    }
  </script>
  {% block head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 text-slate-900 antialiased">
  <header class="border-b border-slate-200 bg-white shadow-sm">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <div>
        <a href="/" class="text-lg font-semibold text-brand-900">CVE-to-My-Stack</a>
        <p class="text-sm text-slate-500">CyberHack 2026 · Offline prioritised CVE list</p>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-200 bg-white py-6 text-center text-sm text-slate-500">
    Offline data only · NVD + CISA KEV + EPSS
  </footer>
</body>
</html>
